<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <title>Réinitialisation — Cube Tag</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Exo+2:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --accent: #2196f3;
                --accent-2: #1e88e5;
                --panel-bg: rgba(255, 255, 255, 0.95);
                --text-main: #222;
                --text-dim: #666;
                --error: #e53935;
                --success: #2e7d32;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Exo 2", sans-serif;
                background: #111;
                color: var(--text-main);
                padding: 24px;
            }
            .box {
                width: min(420px, 100%);
                padding: 28px;
                border-radius: 10px;
                border: 1px solid #ddd;
                background: var(--panel-bg);
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                text-align: center;
            }
            h1 {
                margin: 0 0 10px;
                color: #333;
                font-family: "Exo 2", sans-serif;
                font-size: 24px;
            }
            .subtitle {
                margin: 0 0 18px;
                color: var(--text-dim);
                font-size: 13px;
            }
            input {
                width: 100%;
                margin-bottom: 12px;
                padding: 11px 12px;
                border-radius: 6px;
                border: 1px solid #ccc;
                background: white;
                color: var(--text-main);
                font-family: "Exo 2", sans-serif;
                font-size: 14px;
                outline: none;
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
            }
            input:focus {
                border-color: var(--accent);
                box-shadow: none;
            }
            button {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 5px;
                background: #2196f3;
                color: #fff;
                font-weight: 700;
                font-size: 15px;
                font-family: "Exo 2", sans-serif;
                cursor: pointer;
                transition:
                    transform 0.08s ease,
                    opacity 0.2s ease;
            }
            button:hover {
                opacity: 1;
                background: #1e88e5;
            }
            button:active {
                transform: scale(0.99);
            }
            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            #msg {
                min-height: 20px;
                margin-top: 14px;
                font-size: 13px;
                font-weight: 600;
            }
            .ok {
                color: var(--success);
            }
            .err {
                color: var(--error);
            }
            .back-link {
                margin-top: 16px;
                font-size: 12px;
                color: var(--text-dim);
            }
            .back-link a {
                color: var(--accent);
                text-decoration: none;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>🔑 Nouveau mot de passe</h1>
            <p class="subtitle">
                Choisis un mot de passe solide pour sécuriser ton compte.
            </p>
            <input
                type="password"
                id="pw1"
                placeholder="Nouveau mot de passe (8+ car.)"
            />
            <input
                type="password"
                id="pw2"
                placeholder="Confirmer le mot de passe"
            />
            <button id="reset-btn" onclick="doReset()">Valider</button>
            <div id="msg"></div>
            <div class="back-link">
                Retour au lobby : <a href="/">Cube Tag</a>
            </div>
        </div>
        <script>
            const token = new URLSearchParams(location.search).get("token");
            const msgEl = document.getElementById("msg");
            const resetBtn = document.getElementById("reset-btn");

            if (!token) {
                msgEl.className = "err";
                msgEl.innerText = "Lien invalide.";
                resetBtn.disabled = true;
            }

            async function doReset() {
                const pw1 = document.getElementById("pw1").value;
                const pw2 = document.getElementById("pw2").value;
                if (!pw1 || pw1.length < 8) {
                    msgEl.className = "err";
                    msgEl.innerText = "8 caractères minimum.";
                    return;
                }
                if (pw1 !== pw2) {
                    msgEl.className = "err";
                    msgEl.innerText = "Les mots de passe ne correspondent pas.";
                    return;
                }
                msgEl.className = "";
                msgEl.innerText = "Envoi...";
                const res = await fetch("/api/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, newPassword: pw1 }),
                });
                const data = await res.json();
                if (data.success) {
                    msgEl.className = "ok";
                    msgEl.innerText =
                        "✅ Mot de passe changé ! Retour au jeu dans 3s...";
                    setTimeout(() => (location.href = "/"), 3000);
                } else {
                    msgEl.className = "err";
                    msgEl.innerText = data.message || "Erreur.";
                }
            }
        </script>
    </body>
</html>
